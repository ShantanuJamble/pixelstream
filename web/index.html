<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixelStream: Physics & video</title>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: sans-serif; }
        canvas { background: #000; border: 2px solid #555; margin-top: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<h1>PixelStream: Remote Physics (C++ Authority)</h1>
<button onclick="startCall()" style="padding: 10px 20px; font-size: 1.2rem; cursor: pointer;">Connect & Play</button>
<br>
<canvas id="videoCanvas" width="1280" height="720" style="width: 640px; height: 360px; border: 2px solid red;"></canvas>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
    const signaling = new WebSocket('ws://localhost:8080');
    const pc = new RTCPeerConnection();
    const gameCtx = document.getElementById('gameCanvas').getContext('2d');
    const videoCanvas = document.getElementById('videoCanvas');
    const videoCtx = videoCanvas.getContext('2d');
    let dataChannel = null;

    // Draw the physics ball
    function draw(x, y) {
        gameCtx.clearRect(0, 0, 800, 600);
        gameCtx.beginPath();
        gameCtx.arc(x, y, 20, 0, Math.PI * 2);
        gameCtx.fillStyle = "#3498db";
        gameCtx.fill();
    }

    signaling.onmessage = async (message) => {
        const data = JSON.parse(message.data);
        if (data.description) {
            await pc.setRemoteDescription(data.description);
        } else if (data.candidate) {
            await pc.addIceCandidate({ candidate: data.candidate, sdpMid: data.sdpMid });
        }
    };

    pc.onicecandidate = (event) => {
        if (event.candidate) {
            signaling.send(JSON.stringify({
                candidate: event.candidate.candidate,
                sdpMid: event.candidate.sdpMid,
                sdpMLineIndex: event.candidate.sdpMLineIndex
            }));
        }
    };

    // C++ creates a "video" DataChannel after connection — receive it here
    pc.ondatachannel = (event) => {
        const dc = event.channel;
        console.log("[PC] Received remote DataChannel:", dc.label);
        if (dc.label === "video") {
            dc.binaryType = "arraybuffer";
            dc.onmessage = (msg) => {
                // Each message is a complete JPEG frame — render to canvas
                const blob = new Blob([msg.data], { type: 'image/jpeg' });
                createImageBitmap(blob).then(bitmap => {
                    videoCtx.drawImage(bitmap, 0, 0, videoCanvas.width, videoCanvas.height);
                    bitmap.close();
                });
            };
            dc.onopen = () => console.log("[Video DC] opened");
            dc.onclose = () => console.log("[Video DC] closed");
        }
    };

    async function startCall() {
        dataChannel = pc.createDataChannel("game");
        dataChannel.binaryType = "arraybuffer";

        dataChannel.onmessage = (event) => {
            if (event.data.byteLength === 8) {
                const view = new DataView(event.data);
                const x = view.getFloat32(0, true);
                const y = view.getFloat32(4, true);
                draw(x, y);
            }
        };

        // No video transceiver needed — video comes over DataChannel as JPEG
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        signaling.send(JSON.stringify({ description: pc.localDescription }));
    }
</script>
</body>
</html>
